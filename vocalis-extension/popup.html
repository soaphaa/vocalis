<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocalis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1419;
            color: #e2e8f0;
            width: 480px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: linear-gradient(135deg, #0f1419 0%, #1a202c 100%);
            border-bottom: 2px solid #0066cc;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .title {
            font-weight: 600;
            font-size: 14px;
        }

        .top-controls {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            width: 32px;
            height: 32px;
            background: #2d3748;
            border: 1px solid #475569;
            color: #e2e8f0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 120ms ease;
        }

        .btn-small:hover {
            background: #0066cc;
            border-color: #0066cc;
        }

        .content {
            overflow-y: auto;
            padding: 20px;
            flex: 1;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 6px;
        }

        .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: #1a1f2e;
            border: 1px solid #2d3748;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 13px;
        }

        .form-group select:focus {
            outline: none;
            border-color: #0066cc;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: #1a1f2e;
            border: 1px solid #2d3748;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .checkbox-group input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #0066cc;
        }

        .checkbox-group label {
            font-size: 13px;
            color: #e2e8f0;
            cursor: pointer;
            margin: 0;
            flex: 1;
        }

        .btn-save {
            width: 100%;
            background: #0066cc;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 120ms ease;
        }

        .btn-save:hover {
            background: #0052a3;
        }

        .status {
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .status.success {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .divider {
            height: 1px;
            background: #2d3748;
            margin: 16px 0;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-thumb {
            background: #2d3748;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="title">Vocalis Settings</div>
        <div class="top-controls">
            <button class="btn-small" id="btnA" title="Increase text size">A+</button>
            <button class="btn-small" id="btnCon" title="High contrast">Con</button>
        </div>
    </div>

    <div class="content">
        <div class="status" id="status"></div>

        <div class="section">
            <div class="section-title">Language Settings</div>
            <div class="form-group">
                <label for="langSelect">Transcription Language</label>
                <select id="langSelect">
                    <option value="en-US">English (US)</option>
                    <option value="en-GB">English (UK)</option>
                    <option value="es-ES">Spanish</option>
                    <option value="fr-FR">French</option>
                    <option value="de-DE">German</option>
                    <option value="it-IT">Italian</option>
                    <option value="ja-JP">Japanese</option>
                    <option value="pt-BR">Portuguese</option>
                    <option value="zh-CN">Mandarin</option>
                </select>
            </div>
        </div>

        <div class="divider"></div>

        <div class="section">
            <div class="section-title">Features</div>
            <div class="checkbox-group">
                <input type="checkbox" id="enableLiveCaption" checked>
                <label for="enableLiveCaption">Live captions</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="enableAutoExport" unchecked>
                <label for="enableAutoExport">Auto-export transcript</label>
            </div>
        </div>

        <button class="btn-save" id="btnSave">Save Settings</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
